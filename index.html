<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetLink</title>
    
    <link rel="icon" type="image/png" href="i-Merch Media Logo.png">
    <link rel="apple-touch-icon" href="i-Merch Media Logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --bg: rgba(255, 255, 255, 0.95); --text: #333; --border: #007AFF; --card-bg: #ffffff; --accent: #FF9500; --secondary-text: #8e8e93; }
        .dark-mode { --bg: rgba(28, 28, 30, 0.95); --text: #ffffff; --border: #0A84FF; --card-bg: #1c1c1e; }
        
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        .logo-header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1001; background: var(--bg); padding: 10px 25px; 
            border-radius: 60px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column; align-items: center; border: 1.5px solid var(--border);
        }
        .header-logo-img { height: 35px; }
        .logo-text { font-weight: 800; font-size: 18px; color: var(--text); }
        .logo-text span { color: #007AFF; }

        .stats-container {
            background: var(--card-bg); border-radius: 20px; padding: 15px; margin: 10px 0;
            border: 1px solid #e5e5ea; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .speed-display { text-align: center; flex: 1; border-right: 1px solid #eee; }
        .speed-val { font-size: 28px; font-weight: 800; color: #007AFF; display: block; }
        .speed-unit { font-size: 12px; color: #007AFF; font-weight: bold; }
        
        .other-stats { flex: 1; padding-left: 15px; display: flex; flex-direction: column; gap: 5px; }
        .stat-item { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text); }

        .side-controls { position: absolute; top: 20px; right: 20px; z-index: 1002; display: flex; flex-direction: column; gap: 10px; }
        .control-btn { background: var(--bg); border: 1.5px solid var(--border); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .control-btn.active { background: #007AFF; color: white; }

        .menu { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: var(--bg); padding: 20px; border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; 
            width: 92%; max-width: 380px; border: 1px solid rgba(0,122,255,0.2); color: var(--text);
        }

        .main-btn { padding: 16px; border-radius: 18px; background: #007AFF; color: white; font-weight: bold; border: none; cursor: pointer; font-size: 16px; width: 100%; }
        .fuel-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Marker Transition for smooth rotation */
        .leaflet-marker-icon { transition: transform 0.3s ease-out; }

        .modal-content { background: var(--bg); padding: 20px; border-radius: 20px; width: 85%; max-width: 400px; color: var(--text); position: relative; }
        #chartModal, #routeModal, #fuelModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 5px 0; box-sizing: border-box; }
    </style>
</head>
<body class="light-mode">
    <div class="logo-header">
        <img src="i-Merch Media Logo.png" class="header-logo-img" onerror="this.style.display='none'">
        <div class="logo-text">Fleet<span>Link</span></div>
    </div>

    <div class="side-controls">
        <div class="control-btn" onclick="toggleTheme()">🌓</div>
        <div class="control-btn" id="followBtn" onclick="toggleFollowMe()">📍</div>
        <div class="control-btn" onclick="toggleMapStyle()">🛰️</div>
        <div class="control-btn" onclick="openRouteModal()">🗺️</div>
    </div>

    <div id="map"></div>
    
    <div class="menu">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom: 5px;">
            <img id="profilePic" src="Ron Sarmenta.jpg" style="width:50px; height:50px; border-radius:50%; border:2px solid #007AFF; object-fit:cover;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
            <div>
                <b id="displayDriver" style="font-size:18px;">Ron Sarmenta</b><br>
                <span style="font-size:11px; color:var(--secondary-text);">Last Seen: <span id="lastUpdateTime">--:--:--</span></span>
            </div>
        </div>

        <select id="driverPicker" onchange="updateDriverProfile()" style="margin: 10px 0;">
            <option value="ron">Ron Sarmenta</option>
            <option value="mico">Mico Balmaceda</option>
            <option value="darwin">Darwin Pengson</option>
            <option value="eljhay">Eljhay Ramos</option>
            <option value="vergel">Vergel Archer</option>
        </select>

        <div class="stats-container">
            <div class="speed-display">
                <span id="liveSpeed" class="speed-val">0</span>
                <span class="speed-unit">km/h</span>
            </div>
            <div class="other-stats">
                <div class="stat-item">🔋 <span id="statBatt">--</span>%</div>
                <div class="stat-item">🏁 <span id="statDist">0.00</span> km</div>
            </div>
        </div>

        <div style="display:flex; gap:8px; margin-bottom: 12px;">
            <button id="typeCar" class="type-btn active" style="flex:1; padding:10px; border-radius:12px; border:1px solid #ddd;" onclick="setVehicleType('car')">🚗 Auto</button>
            <button id="typeBike" class="type-btn" style="flex:1; padding:10px; border-radius:12px; border:1px solid #ddd;" onclick="setVehicleType('bike')">🏍️ Motor</button>
        </div>

        <button onclick="toggleTracking()" id="btn" class="main-btn">📡 Start Tracking</button>
        
        <div class="action-grid" style="margin-top:10px;">
            <button onclick="openFuelModal()" class="fuel-btn">⛽ Fuel</button>
            <button onclick="checkAdminPass()" class="fuel-btn" style="background:#5856D6;">📊 Report</button>
        </div>
    </div>

    <div id="chartModal"><div class="modal-content"><h3>📊 Fleet Analysis</h3><canvas id="fuelChart"></canvas><button class="main-btn" onclick="exportFuelCSV()" style="background:#34C759; margin-top:10px;">📥 Download CSV</button><button class="main-btn" style="background:gray; margin-top:5px;" onclick="closeChartModal()">Close</button></div></div>
    <div id="fuelModal"><div class="modal-content"><h3>⛽ Fuel Entry</h3><input type="number" id="fuelAmount" placeholder="PHP Amount"><input type="number" id="fuelLiters" placeholder="Liters"><button class="main-btn" onclick="submitFuel()">Save Log</button><button onclick="closeFuelModal()" style="border:none; background:none; margin-top:10px; width:100%;">Cancel</button></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update, push, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const map = L.map('map', { zoomControl: false, layers: [streetMap] }).setView([14.5794, 121.0359], 15);

        let vehicleMarkers = {};
        let followMe = false;
        let totalDistance = 0;
        let lastPosition = null;
        let deviceBattery = "--";

        // Bearing Calculation (Points marker to movement direction)
        function getBearing(lat1, lng1, lat2, lng2) {
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const y = Math.sin(dLng) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLng);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        // Custom Icon Creator
        const createIcon = (type, rotation = 0) => {
            const url = (type === 'bike') ? 'https://cdn-icons-png.flaticon.com/512/2965/2965319.png' : 'https://cdn-icons-png.flaticon.com/512/741/741407.png';
            return L.divIcon({
                className: 'rotated-marker',
                html: `<img src="${url}" style="width:40px; height:40px; transform: rotate(${rotation}deg);">`,
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });
        };

        onValue(ref(db, 'cars'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            for(let id in data) {
                const { lat, lng, type, heading } = data[id];
                const rotation = heading || 0;
                
                if(!vehicleMarkers[id]) {
                    vehicleMarkers[id] = L.marker([lat, lng], { icon: createIcon(type, rotation) }).addTo(map).bindPopup(id.toUpperCase());
                } else {
                    vehicleMarkers[id].setLatLng([lat, lng]);
                    vehicleMarkers[id].setIcon(createIcon(type, rotation));
                }
            }
        });

        window.toggleTracking = async () => {
            const btn = document.getElementById('btn');
            const driver = document.getElementById('driverPicker').value;
            if (!window.isTracking) {
                window.isTracking = true;
                btn.innerText = "🛑 Stop Tracking"; btn.style.background = "#FF3B30";
                window.watchID = navigator.geolocation.watchPosition(pos => {
                    const { latitude: lat, longitude: lng, heading: devHeading } = pos.coords;
                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    let finalHeading = devHeading || 0;

                    if (lastPosition) {
                        // Use calculated bearing if device doesn't provide heading
                        if (speed > 2) {
                            finalHeading = getBearing(lastPosition.lat, lastPosition.lng, lat, lng);
                        }
                    }

                    update(ref(db, `cars/${driver}`), { lat, lng, speed, heading: finalHeading, lastUpdated: new Date().toLocaleTimeString() });
                    lastPosition = { lat, lng };
                    if(followMe) map.panTo([lat, lng]);
                }, null, { enableHighAccuracy: true });
            } else {
                window.isTracking = false;
                navigator.geolocation.clearWatch(window.watchID);
                btn.innerText = "📡 Start Tracking"; btn.style.background = "#007AFF";
            }
        };

        // Utility boilerplate
        window.toggleFollowMe = () => { followMe = !followMe; document.getElementById('followBtn').classList.toggle('active', followMe); };
        window.toggleTheme = () => document.body.classList.toggle('dark-mode');
        window.toggleMapStyle = () => {
            const isStreet = map.hasLayer(streetMap);
            if(isStreet) { map.removeLayer(streetMap); satelliteMap.addTo(map); } 
            else { map.removeLayer(satelliteMap); streetMap.addTo(map); }
        };
        window.openFuelModal = () => document.getElementById('fuelModal').style.display = 'flex';
        window.closeFuelModal = () => document.getElementById('fuelModal').style.display = 'none';
        window.updateDriverProfile = () => { /* Logic to sync profile UI */ };
    </script>
</body>
</html>
