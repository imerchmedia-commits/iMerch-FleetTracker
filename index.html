<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, update, push, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    const map = L.map('map', { zoomControl: false, layers: [streetMap] }).setView([14.5794, 121.0359], 15);
    
    let currentMapStyle = 'street';
    let vehicleMarkers = {};
    let selectedType = 'car';
    let fuelChartInstance = null;
    let followMe = false;

    // Stats Variables
    let totalDistance = 0;
    let lastPosition = null;
    let deviceBattery = 0; // Changed from "--" to 0 for cleaner logic

    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', iconSize: [40, 40], iconAnchor: [20, 20] });
    const bikeIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2965/2965319.png', iconSize: [40, 40], iconAnchor: [20, 20] });

    // --- Enhanced Battery Management ---
    async function initBattery() {
        if ('getBattery' in navigator) {
            const battery = await navigator.getBattery();
            
            const syncBattery = () => {
                deviceBattery = Math.round(battery.level * 100);
                document.getElementById('statBatt').innerText = deviceBattery;
            };

            syncBattery(); // Initial sync
            battery.addEventListener('levelchange', syncBattery);
            battery.addEventListener('chargingchange', syncBattery);
        }
    }
    initBattery();

    // --- Tracking Logic with Active Battery Refresh ---
    window.toggleTracking = async () => {
        const btn = document.getElementById('btn');
        const driver = document.getElementById('driverPicker').value;
        
        if (!window.isTracking) {
            window.isTracking = true;
            btn.innerText = "🛑 Stop Tracking"; btn.style.background = "#FF3B30";
            
            window.watchID = navigator.geolocation.watchPosition(async (pos) => {
                const lat = pos.coords.latitude; 
                const lng = pos.coords.longitude;
                const speed = Math.round((pos.coords.speed || 0) * 3.6);
                const now = new Date().toLocaleTimeString();
                
                // Force a hardware battery check during GPS active session
                if ('getBattery' in navigator) {
                    const b = await navigator.getBattery();
                    deviceBattery = Math.round(b.level * 100);
                }

                if (lastPosition) {
                    const dist = calculateDistance(lastPosition.lat, lastPosition.lng, lat, lng);
                    // Filter jitter: Only add distance if moved > 5 meters
                    if (dist > 0.005) totalDistance += dist;
                }
                lastPosition = { lat, lng };

                // Update UI elements
                document.getElementById('liveSpeed').innerText = speed;
                document.getElementById('statDist').innerText = totalDistance.toFixed(2);
                document.getElementById('statBatt').innerText = deviceBattery;
                document.getElementById('lastUpdateTime').innerText = now;
                
                // Push comprehensive update to Firebase
                update(ref(db, `cars/${driver}`), { 
                    lat, lng, speed, 
                    distance: totalDistance.toFixed(2),
                    battery: deviceBattery,
                    type: selectedType, 
                    lastUpdated: now 
                });

                if(followMe) map.panTo([lat, lng]);

            }, (err) => console.warn(err), { 
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000 
            });
        } else {
            window.isTracking = false;
            navigator.geolocation.clearWatch(window.watchID);
            btn.innerText = "📡 Start Tracking"; btn.style.background = "#007AFF";
            lastPosition = null;
        }
    };

    // --- Helper Functions ---
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // --- Remaining Control Logic (Maps, Modals, Themes) ---
    window.toggleFollowMe = () => {
        followMe = !followMe;
        const fBtn = document.getElementById('followBtn');
        fBtn.classList.toggle('active', followMe);
        if(followMe && lastPosition) map.panTo([lastPosition.lat, lastPosition.lng]);
    };

    window.toggleMapStyle = (forceStyle) => {
        if (forceStyle === 'satellite' || (forceStyle === undefined && currentMapStyle === 'street')) {
            map.removeLayer(streetMap); satelliteMap.addTo(map); currentMapStyle = 'satellite';
        } else {
            map.removeLayer(satelliteMap); streetMap.addTo(map); currentMapStyle = 'street';
        }
    };

    window.setVehicleType = (type) => {
        selectedType = type;
        const driver = document.getElementById('driverPicker').value;
        document.getElementById('typeCar').classList.toggle('active', type === 'car');
        document.getElementById('typeBike').classList.toggle('active', type === 'bike');
        update(ref(db, `cars/${driver}`), { type: type });
    };

    window.submitFuel = async () => {
        const amount = document.getElementById('fuelAmount').value;
        const liters = document.getElementById('fuelLiters').value;
        const driver = document.getElementById('driverPicker').value;
        if(!amount || !liters) return alert("Fill all fields");
        await push(ref(db, `fuelLogs/${driver}`), {
            amount: parseFloat(amount),
            liters: parseFloat(liters),
            date: new Date().toLocaleDateString(),
            timestamp: Date.now()
        });
        alert("Fuel Logged!");
        closeFuelModal();
    };

    window.exportFuelCSV = async () => {
        const snapshot = await get(ref(db, 'fuelLogs'));
        const data = snapshot.val();
        if(!data) return alert("No data to export");
        let exportData = [];
        for(let driver in data) {
            for(let logId in data[driver]) {
                const log = data[driver][logId];
                exportData.push({ Driver: driver.toUpperCase(), Date: log.date, Amount_PHP: log.amount, Liters: log.liters });
            }
        }
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Fuel Logs");
        XLSX.writeFile(wb, `Fleet_Fuel_Report_${new Date().toLocaleDateString()}.csv`);
    };

    window.updateChart = async () => {
        const snapshot = await get(ref(db, 'fuelLogs'));
        const data = snapshot.val();
        const labels = [];
        const amounts = [];
        if(data) {
            for(let driver in data) {
                labels.push(driver.toUpperCase());
                let total = 0;
                for(let log in data[driver]) total += data[driver][log].amount;
                amounts.push(total);
            }
        }
        const ctx = document.getElementById('fuelChart').getContext('2d');
        if(fuelChartInstance) fuelChartInstance.destroy();
        fuelChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ label: 'Total Spending (PHP)', data: amounts, backgroundColor: '#007AFF' }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
        document.getElementById('chartModal').style.display = 'flex';
    };

    window.checkAdminPass = () => { 
        if (prompt("Admin Password:") === "1234") window.updateChart(); 
        else alert("Incorrect Password"); 
    };

    window.adminClearLogs = async () => {
        if(prompt("Enter Password to Clear Logs:") === "1234") {
            if(confirm("Are you sure? This cannot be undone.")) {
                await remove(ref(db, 'fuelLogs'));
                alert("Logs cleared.");
                window.updateChart();
            }
        } else {
            alert("Incorrect Password.");
        }
    };

    onValue(ref(db, 'cars'), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;
        const currentSelected = document.getElementById('driverPicker').value;
        for(let driver in data) {
            const { lat, lng, type, lastUpdated } = data[driver];
            const icon = (type === 'bike') ? bikeIcon : carIcon;
            if(!vehicleMarkers[driver]) {
                vehicleMarkers[driver] = L.marker([lat, lng], { icon: icon }).addTo(map).bindPopup(driver.toUpperCase());
            } else {
                vehicleMarkers[driver].setLatLng([lat, lng]).setIcon(icon);
            }
            if(driver === currentSelected) {
                document.getElementById('lastUpdateTime').innerText = lastUpdated || "--:--:--";
            }
        }
    });

    window.updateDriverProfile = async () => {
        const picker = document.getElementById('driverPicker');
        const driver = picker.value;
        document.getElementById('profilePic').src = (driver === "ron") ? "Ron Sarmenta.jpg" : driver + ".jpg";
        document.getElementById('displayDriver').innerText = picker.options[picker.selectedIndex].text;
        const snapshot = await get(ref(db, `cars/${driver}`));
        const data = snapshot.val();
        if(data) {
            document.getElementById('lastUpdateTime').innerText = data.lastUpdated || "--:--:--";
            document.getElementById('statDist').innerText = data.distance || "0.00";
            if(data.lat && data.lng) map.setView([data.lat, data.lng], 15);
        }
        totalDistance = 0;
        lastPosition = null;
    };

    window.openRouteModal = () => document.getElementById('routeModal').style.display = 'flex';
    window.closeRouteModal = () => document.getElementById('routeModal').style.display = 'none';
    window.openFuelModal = () => document.getElementById('fuelModal').style.display = 'flex';
    window.closeFuelModal = () => document.getElementById('fuelModal').style.display = 'none';
    window.closeChartModal = () => document.getElementById('chartModal').style.display = 'none';
    window.toggleTheme = () => document.body.classList.toggle('dark-mode');
    window.updateDriverProfile();
</script>
